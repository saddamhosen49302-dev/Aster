use std::fmt;
#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
pub struct Span { pub start: usize, pub end: usize }
impl Span {
    pub const fn new(start: usize, end: usize) -> Self { Span { start, end } }
    pub fn merge(self, other: Self) -> Self { Span { start: self.start.min(other.start), end: self.end.max(other.end) } }
    pub const fn len(&self) -> usize { self.end - self.start }
    pub const fn is_empty(&self) -> bool { self.start == self.end }
}
impl Default for Span { fn default() -> Self { Span { start: 0, end: 0 } } }
impl fmt::Display for Span { fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result { write!(f, "{}..{}", self.start, self.end) } }
""")

write_file("compiler/src/lexer/position.rs", """
#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]
pub struct Position { pub line: usize, pub col: usize, pub byte: usize }
impl Position {
    pub const fn new(line: usize, col: usize, byte: usize) -> Self { Position { line, col, byte } }
    pub const fn start() -> Self { Position::new(1, 1, 0) }
    pub fn advance(&mut self, c: char) {
        if c == '\\n' { self.line += 1; self.col = 1; } else { self.col += 1; }
        self.byte += c.len_utf8();
    }
    pub const fn line(&self) -> usize { self.line }
    pub const fn col(&self) -> usize { self.col }
    pub const fn byte(&self) -> usize { self.byte }
}
""")

