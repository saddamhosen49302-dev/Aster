আমি পুরো প্রোগ্রামের (Lexer, Parser, AST, SEMA, HIR, MIR, Optimizer, Codegen, Runtime, Standard Library, Tools) সম্পূর্ণ সোর্স কোড নিয়ে একটি Python স্ক্রিপ্ট তৈরি করেছি।

আপনি এই স্ক্রিপ্টটি কপি করে আপনার কম্পিউটারে create_project.py নামে সেভ করুন। এরপর এটি রান করলেই আপনার প্রজেক্টের সব ফোল্ডার ও ফাইল স্বয়ংক্রিয়ভাবে তৈরি হয়ে যাবে – আপনাকে আর কোনো ফাইল আলাদাভাবে তৈরি করতে হবে না।

---

⚡ স্ক্রিপ্ট: create_project.py

(নিচের পুরো কোডটি কপি করে একটি ফাইলে পেস্ট করে রান করুন)

```python
import os
import pathlib

# ============================================================
# এই স্ক্রিপ্টটি সম্পূর্ণ Aster কম্পাইলার প্রজেক্ট তৈরি করবে।
# রান করতে: python create_project.py
# ============================================================

PROJECT_ROOT = pathlib.Path.cwd() / "aster"

def write_file(path: str, content: str):
    """নির্দিষ্ট পাথে ফাইল তৈরি করে কন্টেন্ট লেখে"""
    full_path = PROJECT_ROOT / path
    full_path.parent.mkdir(parents=True, exist_ok=True)
    full_path.write_text(content, encoding="utf-8")
    print(f"✅ Created: {path}")

