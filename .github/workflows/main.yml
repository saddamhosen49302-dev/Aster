write_file("compiler/src/parser/parser.rs", """
use crate::lexer::{Tokenizer, Token, TokenKind, Span}; use crate::ast::{File, Item}; use crate::diagnostics::Diagnostic; use super::token_stream::TokenStream; use super::parse_state::ParseState; use super::recovery::Recovery;
pub struct Parser<'src> { pub stream: TokenStream<'src>, pub state: ParseState, pub recovery: Recovery }
impl<'src> Parser<'src> {
    pub fn new(source: &'src str, tokenizer: &'src mut Tokenizer<'src>) -> Self { let stream = TokenStream::new(tokenizer); Parser { stream, state: ParseState::new(), recovery: Recovery::new() } }
    pub fn bump(&mut self) { self.stream.bump(); self.recovery.reset(); }
    pub fn peek_kind(&self) -> TokenKind { self.stream.peek_kind() }
    pub fn at(&self, kind: TokenKind) -> bool { self.stream.at(kind) }
    pub fn at_ident(&self) -> bool { self.stream.at_ident() }
    pub fn expect(&mut self, kind: TokenKind) -> bool { if self.at(kind) { self.bump(); true } else { self.error(&format!("Expected {:?}", kind)); self.recovery.enter(); false } }
    pub fn expect_ident(&mut self) -> String { if self.at_ident() { let name = self.current_ident().unwrap(); self.bump(); name } else { self.error("Expected identifier"); self.recovery.enter(); "".to_string() } }
    pub fn current_kind(&self) -> TokenKind { self.stream.current_kind() }
    pub fn current_span(&self) -> Span { self.stream.current_span() }
    pub fn current_ident(&self) -> Option<String> { self.stream.current_ident() }
    pub fn error(&mut self, msg: &str) { self.state.errors.push(Diagnostic::error(msg).with_span(self.current_span())); }
    pub fn parse_program(&mut self) -> File { let start = self.current_span().start; let mut items = Vec::new(); while !self.at(TokenKind::Eof) { items.push(self.parse_item()); if self.recovery.in_recovery() { self.recovery.recover(self); } } let end = self.current_span().end; File::new(items, Span::new(start, end)) }
}
""")

