use super::tokenizer::Tokenizer; use super::token::TokenKind;
pub fn is_hw_punctuator(c: char) -> bool { matches!(c, '`' | '@' | '$' | '~' | '?') }
impl<'src> Tokenizer<'src> { pub(super) fn lex_hw_punctuator(&mut self) -> TokenKind { let c = self.peek().unwrap(); let s = c.to_string(); self.advance(); TokenKind::HwPunctuator(s) } }
""")

